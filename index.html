<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my albums</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --bg:#f2efea;
  --surface:#ffffff;
  --border:#e4dfd7;
  --text:#0f0f0f;
  --muted:#888;
  --faint:#c8c3bb;
  --green:#22c55e;
  --yellow:#facc15;
  --r:22px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Mono','Menlo',monospace;
  --ease-out:cubic-bezier(0.22,1,0.36,1);
  --ease-spring:cubic-bezier(0.34,1.4,0.64,1);
  --cols:140px;
}

body{font-family:var(--font);background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}

/* ── Header ── */
.header{text-align:center;padding:3rem 1rem 2rem;animation:headerIn 0.6s var(--ease-out) both}
.header h1{font-size:2.6rem;font-weight:700;letter-spacing:-0.04em;color:var(--text);line-height:1}
.header p{font-size:0.68rem;color:var(--muted);margin-top:6px;letter-spacing:0.05em}

/* ── Stats ── */
.stats-bar{display:flex;justify-content:center;margin:0 auto 1.8rem;border-radius:999px;overflow:hidden;border:1px solid var(--border);background:var(--surface);max-width:340px;box-shadow:0 2px 16px rgba(0,0,0,0.05);animation:fadeUp 0.5s var(--ease-out) 0.1s both}
.stat{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--mono);font-size:1.15rem;color:var(--text);line-height:1}
.stat-l{font-size:0.58rem;color:var(--faint);margin-top:3px;letter-spacing:0.07em;text-transform:uppercase}

/* ── Nav ── */
.nav{display:flex;justify-content:center;gap:6px;margin-bottom:1.8rem;animation:fadeUp 0.5s var(--ease-out) 0.15s both}
.nav-btn{padding:9px 24px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.72rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s var(--ease-out);font-family:var(--font);letter-spacing:0.03em;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.nav-btn.active{background:var(--text);color:#fff;border-color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.nav-btn:hover:not(.active){border-color:#999;color:var(--text);transform:translateY(-1px)}
.nav-btn:active{transform:scale(0.97)}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:8px;padding:0 1.4rem 1rem;flex-wrap:wrap;max-width:1100px;margin:0 auto;animation:fadeUp 0.5s var(--ease-out) 0.2s both}
.searchbox{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:9px 18px;transition:all 0.2s;flex:1;max-width:340px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.searchbox:focus-within{border-color:var(--text);box-shadow:0 0 0 3px rgba(0,0,0,0.07)}
.searchbox svg{flex-shrink:0;color:var(--faint)}
.searchbox input{border:none;background:transparent;font-size:0.75rem;color:var(--text);outline:none;width:100%;font-family:var(--font)}
.searchbox input::placeholder{color:var(--faint)}
.sort-wrap{display:flex;gap:5px}
.sort-btn{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.65rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s var(--ease-out);font-family:var(--font);letter-spacing:0.03em;white-space:nowrap}
.sort-btn.on{background:var(--text);color:#fff;border-color:var(--text)}
.sort-btn:hover:not(.on){border-color:#999;color:var(--text)}
.grid-size-btn{width:36px;height:36px;border-radius:999px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s var(--ease-out);flex-shrink:0;color:var(--muted)}
.grid-size-btn:hover{border-color:#999;color:var(--text);transform:scale(1.07)}
.grid-size-btn:active{transform:scale(0.93)}

/* ── Genre pills ── */
.genre-row{padding:0 1.4rem 1.2rem;max-width:1100px;margin:0 auto;display:flex;gap:6px;flex-wrap:wrap;animation:fadeUp 0.5s var(--ease-out) 0.25s both}
.pill{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.65rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.18s var(--ease-out);font-family:var(--font);letter-spacing:0.03em}
.pill.on{background:var(--text);color:#fff;border-color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.pill:hover:not(.on){border-color:#999;color:var(--text);transform:translateY(-1px)}
.pill:active{transform:scale(0.96)}

/* ── Status ── */
.status-bar{text-align:center;padding:2px 0 12px;font-size:0.65rem;color:var(--faint);letter-spacing:0.04em}
.status-bar span{color:var(--muted)}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--cols),1fr));gap:10px;padding:0 1.4rem 2rem;max-width:1100px;margin:0 auto;transition:grid-template-columns 0.4s var(--ease-out)}

.card{border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:1;background:var(--border);transition:transform 0.22s var(--ease-out),box-shadow 0.22s var(--ease-out);box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 16px 40px rgba(0,0,0,0.13);z-index:2}
.card:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.card.fade-in{animation:cardIn 0.4s var(--ease-out) both}
.card img{width:100%;height:100%;object-fit:cover;display:block;border-radius:var(--r)}
.card-fallback{width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px;border-radius:var(--r)}
.fb-t{font-size:0.7rem;font-weight:600;color:#fff;text-align:center;line-height:1.2;word-break:break-word}
.fb-a{font-size:0.58rem;color:rgba(255,255,255,0.5);text-align:center}
.check-ring{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;transform:scale(0) rotate(-20deg);transition:transform 0.3s var(--ease-spring);z-index:3;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.card.saved .check-ring{transform:scale(1) rotate(0deg)}
.check-ring svg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── Infinite scroll ── */
.sentinel{height:80px;display:flex;align-items:center;justify-content:center}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:spin 0.75s linear infinite;opacity:0;transition:opacity 0.3s}
.spinner.on{opacity:1}
.shelf-empty{grid-column:1/-1;text-align:center;padding:5rem 1rem;animation:fadeUp 0.4s var(--ease-out) both}
.shelf-empty p{font-size:0.75rem;color:var(--faint);letter-spacing:0.04em}
.api-note{text-align:center;font-size:0.6rem;color:var(--faint);padding-bottom:2.5rem;letter-spacing:0.04em}
.api-note a{color:var(--faint)}

/* ── Panel overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:100;pointer-events:none;transition:background 0.3s,backdrop-filter 0.3s,-webkit-backdrop-filter 0.3s}
.overlay.open{background:rgba(0,0,0,0.38);pointer-events:all;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

/* Centered bubble modal */
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.88);background:var(--surface);border-radius:28px;z-index:101;width:min(520px,92vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.22),0 0 0 1px rgba(0,0,0,0.06);opacity:0;pointer-events:none;transition:transform 0.35s var(--ease-spring),opacity 0.25s var(--ease-out)}
.panel.open{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all}
.panel-drag{display:none}
.panel-head{display:flex;gap:18px;padding:22px 22px 0;flex-shrink:0;position:relative}
.panel-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--muted);transition:all 0.18s;line-height:1;padding:0;font-family:var(--font)}
.panel-close:hover{background:var(--text);color:#fff;border-color:var(--text)}
.panel-cover{width:96px;height:96px;border-radius:18px;object-fit:cover;background:var(--border);flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.panel-cover-fallback{width:96px;height:96px;border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;flex-direction:column;gap:4px;padding:10px;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.panel-meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px;padding-right:28px}
.panel-title{font-size:1.05rem;font-weight:600;letter-spacing:-0.02em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.panel-artist{font-size:0.8rem;color:var(--muted)}
.panel-date{font-size:0.63rem;color:var(--faint);font-family:var(--mono);margin-top:2px}
.panel-actions{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap}
.btn-save{padding:8px 18px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.72rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.2s var(--ease-out);color:var(--text)}
.btn-save:hover{border-color:var(--text);transform:translateY(-1px)}
.btn-save:active{transform:scale(0.96)}
.btn-save.saved-btn{background:var(--text);color:#fff;border-color:var(--text)}

/* Half-star rating */
.stars-panel{display:flex;gap:1px;align-items:center}
.star-wrap{position:relative;width:1.6rem;height:1.6rem;cursor:pointer;flex-shrink:0}
.star-wrap svg{width:100%;height:100%;display:block;transition:transform 0.15s var(--ease-spring)}
.star-wrap:hover svg{transform:scale(1.25)}
.star-wrap:active svg{transform:scale(0.88)}
.star-left,.star-right{position:absolute;top:0;height:100%;width:50%}
.star-left{left:0}
.star-right{right:0}

.panel-body{overflow-y:auto;padding:18px 22px 2.5rem;flex:1;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.panel-section{margin-bottom:22px}
.panel-section-label{font-size:0.6rem;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}

/* Tracklist */
.tracklist{display:flex;flex-direction:column}
.track{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bg)}
.track:last-child{border-bottom:none}
.track-n{font-family:var(--mono);font-size:0.63rem;color:var(--faint);width:18px;text-align:right;flex-shrink:0}
.track-title{font-size:0.78rem;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-dur{font-family:var(--mono);font-size:0.63rem;color:var(--faint);flex-shrink:0}
.tracks-loading{padding:10px 0;display:flex;align-items:center;gap:6px}
.dot-pulse{display:flex;gap:5px}
.dot-pulse span{width:6px;height:6px;border-radius:50%;background:var(--faint);animation:dotPulse 1.2s ease infinite}
.dot-pulse span:nth-child(2){animation-delay:0.2s}
.dot-pulse span:nth-child(3){animation-delay:0.4s}

/* Opinion */
.opinion-wrap{display:flex;flex-direction:column;gap:8px}
.opinion-input{width:100%;border:1px solid var(--border);border-radius:16px;padding:12px 14px;font-size:0.78rem;font-family:var(--font);color:var(--text);background:var(--bg);resize:none;outline:none;transition:border-color 0.2s,box-shadow 0.2s;min-height:80px;line-height:1.55}
.opinion-input:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(0,0,0,0.06)}
.opinion-input::placeholder{color:var(--faint)}
.opinion-save-btn{align-self:flex-end;padding:7px 18px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.7rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.2s var(--ease-out);color:var(--text)}
.opinion-save-btn:hover{background:var(--text);color:#fff;border-color:var(--text);transform:translateY(-1px)}
.opinion-save-btn:active{transform:scale(0.96)}
.opinion-save-btn.saved-flash{background:var(--green);color:#fff;border-color:var(--green)}

/* ── Keyframes ── */
@keyframes headerIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:scale(0.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotPulse{0%,80%,100%{opacity:0.2}40%{opacity:1}}


</style>
</head>
<body>

<div class="header">
  <h1>my albums</h1>
  <p>personal music shelf · data from MusicBrainz</p>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">saved</div></div>
  <div class="stat"><div class="stat-n" id="s-rated">0</div><div class="stat-l">rated</div></div>
  <div class="stat"><div class="stat-n" id="s-avg">—</div><div class="stat-l">avg ★</div></div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchTab('browse',this)">Browse</button>
  <button class="nav-btn" onclick="switchTab('shelf',this)">My Shelf</button>
</div>

<div class="toolbar">
  <div class="searchbox">
    <svg width="13" height="13" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="q" placeholder="Search any album or artist…" oninput="onSearch()">
  </div>
  <div class="sort-wrap">
    <button class="sort-btn on" id="sort-popular" onclick="setSort('popular',this)">Popular</button>
    <button class="sort-btn" id="sort-newest" onclick="setSort('newest',this)">Newest</button>
    <button class="sort-btn" id="sort-oldest" onclick="setSort('oldest',this)">Oldest</button>
  </div>
  <button class="grid-size-btn" id="grid-size-btn" onclick="cycleGridSize()" title="Change grid size">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
  </button>
</div>

<div class="genre-row" id="genre-row"></div>
<div class="status-bar" id="status-bar"></div>
<div class="grid" id="grid"></div>
<div class="sentinel" id="sentinel"><div class="spinner" id="spinner"></div></div>
<p class="api-note">Data from <a href="https://musicbrainz.org" target="_blank">MusicBrainz</a> · Art from Cover Art Archive</p>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-drag"></div>
  <div class="panel-head">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <img id="p-img" class="panel-cover" src="" alt="" onerror="this.style.display='none';document.getElementById('p-img-fallback').style.display='flex'">
    <div id="p-img-fallback" class="panel-cover-fallback" style="display:none"></div>
    <div class="panel-meta">
      <div class="panel-title" id="p-title">—</div>
      <div class="panel-artist" id="p-artist">—</div>
      <div class="panel-date" id="p-date"></div>
      <div class="panel-actions">
        <button class="btn-save" id="p-save-btn" onclick="panelToggle()">+ Save</button>
        <div class="stars-panel" id="p-stars"></div>
      </div>
    </div>
  </div>
  <div class="panel-body">
    <div class="panel-section">
      <div class="panel-section-label">My opinion</div>
      <div class="opinion-wrap">
        <textarea class="opinion-input" id="p-opinion" placeholder="What do you think of this album…" rows="3" oninput="opinionChanged()"></textarea>
        <button class="opinion-save-btn" id="p-opinion-btn" onclick="saveOpinion()">Save note</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-label">Tracklist</div>
      <div class="tracklist" id="p-tracks">
        <div class="tracks-loading"><div class="dot-pulse"><span></span><span></span><span></span></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const GENRES=['all','rock','pop','hip-hop','jazz','electronic','r&b','soul','metal','folk','classical','country','reggae','punk','indie','salsa'];
const COLORS=['#2b2d42','#6b1a1a','#1d4ed8','#1a5c1a','#b91c1c','#92610a','#1e40af','#5b21b6','#065f46','#be185d','#155e75','#7c2d12','#0f172a','#4a1d96','#3b0764','#166534','#854d0e','#1c1917','#0ea5e9','#7f1d1d'];
const SEED_ARTISTS=['radiohead','beatles','kendrick lamar','frank ocean','beyonce','pink floyd','nirvana','michael jackson','taylor swift','kanye west','amy winehouse','miles davis','fleetwood mac','the weeknd','bob dylan','daft punk','prince','stevie wonder','madonna','david bowie','lcd soundsystem','arcade fire','tame impala','nas','jay-z','billie eilish','adele','drake','rihanna','eminem','sade','portishead','bjork','fiona apple','phoebe bridgers','lorde','haim','angel olsen','cardi b','lizzo','bad bunny','j balvin','marc anthony','celia cruz','willie colon','rubén blades','héctor lavoe','fania all stars','buena vista social club','ibrahim ferrer','tito puente','arturo sandoval','carlos santana','ibrahim maalouf','thievery corporation'];
const GRID_SIZES=[
  {label:'sm',cols:'95px',icon:'<svg width="15" height="15" viewBox="0 0 18 18" fill="currentColor"><rect x="0.5" y="0.5" width="4.5" height="4.5" rx="1.2"/><rect x="6.75" y="0.5" width="4.5" height="4.5" rx="1.2"/><rect x="13" y="0.5" width="4.5" height="4.5" rx="1.2"/><rect x="0.5" y="6.75" width="4.5" height="4.5" rx="1.2"/><rect x="6.75" y="6.75" width="4.5" height="4.5" rx="1.2"/><rect x="13" y="6.75" width="4.5" height="4.5" rx="1.2"/><rect x="0.5" y="13" width="4.5" height="4.5" rx="1.2"/><rect x="6.75" y="13" width="4.5" height="4.5" rx="1.2"/><rect x="13" y="13" width="4.5" height="4.5" rx="1.2"/></svg>'},
  {label:'md',cols:'140px',icon:'<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>'},
  {label:'lg',cols:'210px',icon:'<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6.5" height="14" rx="2"/><rect x="8.5" y="1" width="6.5" height="14" rx="2"/></svg>'}
];

let shelf={}, activeTab='browse', currentSort='popular', activeGenre='all';
let browseOffset=0, browseTotal=0, loading=false, searchTimeout=null;
let panelAlbum=null;
let gridSizeIdx=1;
const PAGE=24;

function loadShelf(){try{const s=localStorage.getItem('mab_shelf6');if(s)shelf=JSON.parse(s);}catch(e){}}
function saveShelf(){try{localStorage.setItem('mab_shelf6',JSON.stringify(shelf));}catch(e){}}
function albumColor(id){let h=0;for(let i=0;i<id.length;i++){h=((h<<5)-h)+id.charCodeAt(i);h|=0;}return COLORS[Math.abs(h)%COLORS.length];}
function coverUrl(mbid){return `https://coverartarchive.org/release/${mbid}/front-250`;}

// Try cover art, fall back to release-group art
function loadCardImage(img, mbid, rgid){
  img.src = coverUrl(mbid);
  img.onerror = function(){
    if(rgid){
      img.onerror = function(){ img.style.display='none'; img.nextElementSibling.style.display='flex'; };
      img.src = `https://coverartarchive.org/release-group/${rgid}/front-250`;
    } else {
      img.style.display='none'; img.nextElementSibling.style.display='flex';
    }
  };
}

// Dedupe seen titles+artists in browse results
const seenTitles = new Set();
function resetSeen(){ seenTitles.clear(); }
function isDupe(r){
  const title=(r.title||'').toLowerCase().replace(/\s*[\(\[].*(deluxe|edition|remaster|bonus|expanded|special|anniversary|version|reissue|vinyl|limited).*[\)\]]/i,'').trim();
  const artist=(r['artist-credit']?.[0]?.artist?.name||r['artist-credit']?.[0]?.name||'').toLowerCase().trim();
  const key=title+'||'+artist;
  if(seenTitles.has(key)) return true;
  seenTitles.add(key);
  return false;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function msToTime(ms){if(!ms)return'';const s=Math.round(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

// ── Grid size cycle ────────────────────────────────────────────────────────
function cycleGridSize(){
  gridSizeIdx=(gridSizeIdx+1)%GRID_SIZES.length;
  const size=GRID_SIZES[gridSizeIdx];
  document.documentElement.style.setProperty('--cols',size.cols);
  const btn=document.getElementById('grid-size-btn');
  btn.innerHTML=size.icon;
  btn.style.transform='rotate(90deg) scale(0.85)';
  setTimeout(()=>{btn.style.transition='transform 0.3s var(--ease-spring)';btn.style.transform='rotate(0deg) scale(1)';},20);
}

// ── Infinite scroll via IntersectionObserver ───────────────────────────────
const sentinel=document.getElementById('sentinel');
const ioObserver=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting && activeTab==='browse' && !loading){
    fetchBrowse(false);
  }
},{rootMargin:'300px'});
ioObserver.observe(sentinel);

// ── Panel ──────────────────────────────────────────────────────────────────
function openPanel(album){
  panelAlbum=album;
  const {id,title,artist,year,rgid=''}=album;
  const color=albumColor(id);
  const img=document.getElementById('p-img');
  const fb=document.getElementById('p-img-fallback');
  img.style.display='block';fb.style.display='none';
  img.src='';
  img.onerror=function(){
    if(rgid&&img.src.includes('/release/')){
      img.onerror=function(){img.style.display='none';fb.style.display='flex';};
      img.src=`https://coverartarchive.org/release-group/${rgid}/front-250`;
    } else {
      img.style.display='none';fb.style.display='flex';
    }
  };
  requestAnimationFrame(()=>{img.src=coverUrl(id);});
  fb.style.background=color;
  fb.innerHTML=`<div class="fb-t" style="color:#fff">${esc(title)}</div><div class="fb-a">${esc(artist)}</div>`;
  document.getElementById('p-title').textContent=title;
  document.getElementById('p-artist').textContent=artist;
  document.getElementById('p-date').textContent=year||'';
  updateSaveBtn(id);renderPanelStars(id);
  const op=shelf[id]?.opinion||'';
  document.getElementById('p-opinion').value=op;
  const obtn=document.getElementById('p-opinion-btn');
  obtn.classList.remove('saved-flash');obtn.textContent='Save note';
  document.getElementById('p-tracks').innerHTML='<div class="tracks-loading"><div class="dot-pulse"><span></span><span></span><span></span></div></div>';
  fetchTracks(id);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.body.style.overflow='';
  panelAlbum=null;
}

async function fetchTracks(id){
  try{
    const r=await fetch(`https://musicbrainz.org/ws/2/release/${id}?inc=recordings&fmt=json`);
    if(!r.ok) throw new Error('');
    const data=await r.json();
    const date=data.date||data['release-events']?.[0]?.date||'';
    if(date) document.getElementById('p-date').textContent=date;
    const media=data.media||[];
    const tracks=[];
    media.forEach(m=>{
      const discN=media.length>1?m.position:null;
      (m.tracks||[]).forEach(t=>tracks.push({n:t.position,title:t.title,len:t.length,disc:discN}));
    });
    if(!tracks.length){
      document.getElementById('p-tracks').innerHTML='<div style="font-size:0.72rem;color:var(--faint);padding:8px 0">No tracklist available</div>';return;
    }
    let html='',lastDisc=null;
    tracks.forEach((t,idx)=>{
      if(t.disc&&t.disc!==lastDisc){
        html+=`<div style="font-size:0.58rem;color:var(--faint);text-transform:uppercase;letter-spacing:0.09em;padding:10px 0 4px">Disc ${t.disc}</div>`;
        lastDisc=t.disc;
      }
      html+=`<div class="track" style="animation:fadeUp 0.25s var(--ease-out) ${Math.min(idx*15,400)}ms both"><span class="track-n">${t.n}</span><span class="track-title">${esc(t.title)}</span><span class="track-dur">${msToTime(t.len)}</span></div>`;
    });
    document.getElementById('p-tracks').innerHTML=html;
  }catch(e){
    document.getElementById('p-tracks').innerHTML='<div style="font-size:0.72rem;color:var(--faint);padding:8px 0">Could not load tracklist</div>';
  }
}

function updateSaveBtn(id){
  const btn=document.getElementById('p-save-btn');
  if(shelf[id]){btn.textContent='✓ Saved';btn.classList.add('saved-btn');}
  else{btn.textContent='+ Save';btn.classList.remove('saved-btn');}
}

function renderPanelStars(id){
  const rating=shelf[id]?.rating||0;
  // Build 5 stars with half-star support via SVG clip
  let html='';
  for(let i=1;i<=5;i++){
    const full=rating>=i;
    const half=!full&&rating>=i-0.5&&rating<i;
    // SVG star: left half filled (half), full filled, or empty
    const fillColor=`var(--yellow)`;
    const emptyColor=`var(--border)`;
    html+=`<span class="star-wrap" data-pos="${i}">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="sc-half-${i}"><rect x="0" y="0" width="12" height="24"/></clipPath>
          <clipPath id="sc-full-${i}"><rect x="0" y="0" width="24" height="24"/></clipPath>
        </defs>
        <!-- empty base -->
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${emptyColor}" stroke="${emptyColor}" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- filled overlay -->
        ${full?`<polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${fillColor}" clip-path="url(#sc-full-${i})"/>`:''}
        ${half?`<polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${fillColor}" clip-path="url(#sc-half-${i})"/>`:''}
      </svg>
      <span class="star-left" onclick="setPanelRating(${i-0.5})"></span>
      <span class="star-right" onclick="setPanelRating(${i})"></span>
    </span>`;
  }
  document.getElementById('p-stars').innerHTML=html;
}

function setPanelRating(v){
  if(!panelAlbum)return;
  const id=panelAlbum.id;
  if(!shelf[id]) shelf[id]={addedAt:Date.now(),title:panelAlbum.title,artist:panelAlbum.artist,year:panelAlbum.year};
  // Toggle off if same rating clicked
  if(shelf[id].rating===v) shelf[id].rating=0;
  else shelf[id].rating=v;
  saveShelf();updateStats();renderPanelStars(id);
  updateCardSaved(id,true);updateSaveBtn(id);
}

function panelToggle(){
  if(!panelAlbum)return;
  const {id,title,artist,year}=panelAlbum;
  if(shelf[id]){delete shelf[id];updateCardSaved(id,false);}
  else{shelf[id]={rating:0,addedAt:Date.now(),title,artist,year};updateCardSaved(id,true);}
  saveShelf();updateStats();updateSaveBtn(id);renderPanelStars(id);
  if(activeTab==='shelf') renderShelf();
}

function opinionChanged(){
  const btn=document.getElementById('p-opinion-btn');
  btn.classList.remove('saved-flash');btn.textContent='Save note';
}

function saveOpinion(){
  if(!panelAlbum)return;
  const id=panelAlbum.id;
  const text=document.getElementById('p-opinion').value.trim();
  if(!shelf[id]) shelf[id]={rating:0,addedAt:Date.now(),title:panelAlbum.title,artist:panelAlbum.artist,year:panelAlbum.year};
  shelf[id].opinion=text;saveShelf();
  const btn=document.getElementById('p-opinion-btn');
  btn.classList.add('saved-flash');btn.textContent='Saved ✓';
  setTimeout(()=>{btn.classList.remove('saved-flash');btn.textContent='Save note';},1600);
}

function updateCardSaved(id,isSaved){
  document.getElementById('card-'+id)?.classList.toggle('saved',isSaved);
}

function updateStats(){
  const ids=Object.keys(shelf);
  const rated=ids.filter(id=>shelf[id]?.rating>0);
  const avg=rated.length?(rated.reduce((s,id)=>s+(shelf[id].rating||0),0)/rated.length).toFixed(1):'—';
  document.getElementById('s-total').textContent=ids.length;
  document.getElementById('s-rated').textContent=rated.length;
  document.getElementById('s-avg').textContent=avg==='—'?avg:(parseFloat(avg)%1===0?parseFloat(avg).toFixed(0):avg);
}

// ── Card HTML ──────────────────────────────────────────────────────────────
function cardHtml(r,delay=0){
  const id=r.id;
  const title=r.title||'Unknown';
  const artist=r['artist-credit']?.[0]?.artist?.name||r['artist-credit']?.[0]?.name||'Unknown';
  const year=(r.date||r['first-release-date']||'').slice(0,4);
  const rgid=r['release-group']?.id||'';
  const saved=!!shelf[id];
  const color=albumColor(id);
  const album={id,title,artist,year,rgid};
  const aj=JSON.stringify(album).replace(/\\/g,'\\\\').replace(/'/g,'\\u0027').replace(/"/g,'&quot;');
  return `<div class="card fade-in${saved?' saved':''}" id="card-${id}" style="animation-delay:${delay}ms" onclick="openPanel(${aj})" data-rgid="${esc(rgid)}">
    <img src="${coverUrl(id)}" alt="${esc(title)}" loading="lazy" data-mbid="${esc(id)}" data-rgid="${esc(rgid)}">
    <div class="card-fallback" style="background:${color}"><div class="fb-t">${esc(title)}</div><div class="fb-a">${esc(artist)}</div></div>
    <div class="check-ring"><svg viewBox="0 0 13 10"><polyline points="1.5,5 5,8.5 11.5,1.5"/></svg></div>
  </div>`;
}

// ── Shelf ──────────────────────────────────────────────────────────────────
function renderShelf(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const grid=document.getElementById('grid');
  document.getElementById('spinner').classList.remove('on');
  const ids=Object.keys(shelf);
  if(!ids.length){grid.innerHTML='<div class="shelf-empty"><p>Tap any album to save it here</p></div>';document.getElementById('status-bar').innerHTML='';return;}
  const saved=ids.map(id=>({id,...shelf[id]})).filter(a=>!q||(a.title||'').toLowerCase().includes(q)||(a.artist||'').toLowerCase().includes(q)).sort((a,b)=>b.addedAt-a.addedAt);
  grid.innerHTML=saved.map((a,i)=>{
    const color=albumColor(a.id);
    const title=a.title||'Unknown',artist=a.artist||'Unknown',year=a.year||'',rgid=a.rgid||'';
    const album={id:a.id,title,artist,year,rgid};
    const aj=JSON.stringify(album).replace(/\\/g,'\\\\').replace(/'/g,'\\u0027').replace(/"/g,'&quot;');
    return `<div class="card fade-in saved" id="card-${a.id}" style="animation-delay:${i*20}ms" onclick="openPanel(${aj})">
      <img src="${coverUrl(a.id)}" alt="${esc(title)}" loading="lazy" data-mbid="${esc(a.id)}" data-rgid="${esc(rgid)}">
      <div class="card-fallback" style="background:${color}"><div class="fb-t">${esc(title)}</div><div class="fb-a">${esc(artist)}</div></div>
      <div class="check-ring"><svg viewBox="0 0 13 10"><polyline points="1.5,5 5,8.5 11.5,1.5"/></svg></div>
    </div>`;
  }).join('');
  // Hook fallbacks
  hookImageFallbacks(grid);
  document.getElementById('status-bar').innerHTML=`<span>${saved.length}</span> album${saved.length!==1?'s':''} saved`;
}

// ── Genre → MusicBrainz tag mapping
const GENRE_TAGS={
  'rock':'rock','pop':'pop','hip-hop':'hip hop','jazz':'jazz',
  'electronic':'electronic','r&b':'rhythm and blues','soul':'soul',
  'metal':'metal','folk':'folk','classical':'classical','country':'country',
  'reggae':'reggae','punk':'punk','indie':'indie rock','salsa':'salsa'
};

// Rotating seed for popular mode — advances on each page load
let popularSeedIdx=Math.floor(Math.random()*SEED_ARTISTS.length);

function buildQuery(q, genre, sort){
  // Search mode: user typed something
  if(q.trim()){
    let base=`(release:"${q}" OR artist:"${q}") AND primarytype:Album AND status:Official`;
    if(genre!=='all'){const tag=GENRE_TAGS[genre]||genre;base+=` AND tag:"${tag}"`;}
    return base;
  }

  // Genre mode: show albums tagged with this genre, sorted by relevance
  if(genre!=='all'){
    const tag=GENRE_TAGS[genre]||genre;
    // Use tag search — don't restrict by artist so it's unbiased
    if(sort==='newest') return `tag:"${tag}" AND primarytype:Album AND status:Official AND date:[2000 TO *]`;
    if(sort==='oldest') return `tag:"${tag}" AND primarytype:Album AND status:Official`;
    // popular: use tag with a relevance boost by also requiring it as a secondary tag
    return `tag:"${tag}" AND primarytype:Album AND status:Official`;
  }

  // No genre, no search — "All" mode
  if(sort==='newest') return `primarytype:Album AND status:Official AND date:[2010 TO *]`;
  if(sort==='oldest') return `primarytype:Album AND status:Official AND date:[1950 TO 1980]`;

  // Popular / default: rotate through seed artists for variety
  const seed=SEED_ARTISTS[popularSeedIdx%SEED_ARTISTS.length];
  return `artist:"${seed}" AND primarytype:Album AND status:Official`;
}

function hookImageFallbacks(grid){
  grid.querySelectorAll('.card img[data-mbid]').forEach(img=>{
    if(img._hookDone) return;
    img._hookDone=true;
    const rgid=img.dataset.rgid||'';
    img.onerror=function(){
      if(rgid&&img.src.includes('/release/')){
        img.onerror=function(){img.style.display='none';img.nextElementSibling.style.display='flex';};
        img.src=`https://coverartarchive.org/release-group/${rgid}/front-250`;
      } else {
        img.style.display='none';img.nextElementSibling.style.display='flex';
      }
    };
  });
}

// Fetch with retry on 503 (MB rate limit)
async function mbFetch(query, offset){
  const params=new URLSearchParams({query, limit:PAGE, offset, fmt:'json'});
  const url=`https://musicbrainz.org/ws/2/release/?${params}`;
  for(let attempt=0;attempt<3;attempt++){
    if(attempt>0) await new Promise(r=>setTimeout(r, 1200*attempt));
    try{
      // Do NOT send custom headers — browsers block User-Agent and it causes preflight CORS failures
      const r=await fetch(url);
      if(r.status===503||r.status===429){
        // Rate limited — wait and retry
        await new Promise(r=>setTimeout(r,2000));
        continue;
      }
      if(!r.ok) throw new Error('HTTP '+r.status);
      return await r.json();
    }catch(e){
      if(attempt===2) throw e;
    }
  }
}

let lastFetchTime=0;
async function fetchBrowse(reset=false){
  if(loading)return;
  // Throttle: don't fire more than once per second
  const now=Date.now();
  if(now-lastFetchTime<1000&&!reset){loading=false;return;}
  lastFetchTime=now;
  loading=true;
  if(reset){
    browseOffset=0;browseTotal=0;resetSeen();
    popularSeedIdx=Math.floor(Math.random()*SEED_ARTISTS.length);
  }
  const q=document.getElementById('q').value;
  const grid=document.getElementById('grid');
  const spinner=document.getElementById('spinner');
  if(reset) grid.innerHTML='';
  spinner.classList.add('on');
  try{
    const query=buildQuery(q,activeGenre,currentSort);
    const data=await mbFetch(query,browseOffset);
    const raw=data.releases||[];
    browseTotal=data.count||0;
    browseOffset+=raw.length;

    const releases=raw.filter(r=>r.id&&r.title&&!isDupe(r));

    if(raw.length===0&&grid.querySelectorAll('.card').length===0){
      grid.innerHTML='<div class="shelf-empty"><p>No results — try a different search or genre</p></div>';
      document.getElementById('status-bar').innerHTML='';
    } else if(releases.length>0){
      grid.insertAdjacentHTML('beforeend',releases.map((r,i)=>cardHtml(r,i*22)).join(''));
      hookImageFallbacks(grid);
      const showing=grid.querySelectorAll('.card').length;
      document.getElementById('status-bar').innerHTML=`<span>${showing.toLocaleString()}</span> albums shown`;
    } else if(raw.length>0&&releases.length===0&&browseOffset<Math.min(browseTotal,PAGE*6)){
      // All dupes on this page — silently fetch next
      loading=false;spinner.classList.remove('on');
      fetchBrowse(false);return;
    }

    // In popular/all mode: when we exhaust one seed artist, rotate to next on next scroll
    if(!q.trim()&&activeGenre==='all'&&currentSort==='popular'&&raw.length<PAGE){
      popularSeedIdx++;
      browseOffset=0;browseTotal=0;
    }
  }catch(e){
    console.error(e);
    if(grid.querySelectorAll('.card').length===0){
      grid.insertAdjacentHTML('beforeend','<div style="grid-column:1/-1;text-align:center;color:var(--faint);padding:2rem;font-size:0.7rem">Could not reach MusicBrainz — check your connection.</div>');
    }
  }
  spinner.classList.remove('on');
  loading=false;
}

// ── Controls ───────────────────────────────────────────────────────────────
function setSort(s,el){
  currentSort=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  if(activeTab==='browse') fetchBrowse(true);
}
function setGenre(g){
  activeGenre=g;document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.dataset.genre===g));
  if(activeTab==='browse') fetchBrowse(true);
}
function onSearch(){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{if(activeTab==='browse') fetchBrowse(true);else renderShelf();},380);
}
function switchTab(t,el){
  activeTab=t;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');
  if(t==='browse') fetchBrowse(true);else renderShelf();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape') closePanel();});

// ── Init ───────────────────────────────────────────────────────────────────
const GENRE_LABELS={'all':'All','hip-hop':'Hip Hop','r&b':'R&B','salsa':'Salsa'};
document.getElementById('genre-row').innerHTML=GENRES.map(g=>{
  const label=GENRE_LABELS[g]||(g.charAt(0).toUpperCase()+g.slice(1));
  return `<button class="pill${g==='all'?' on':''}" data-genre="${g}" onclick="setGenre('${g}')">${label}</button>`;
}).join('');

loadShelf();updateStats();fetchBrowse(true);
