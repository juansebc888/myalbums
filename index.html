<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my albums</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f3ef;
  --surface:#fff;
  --border:#e8e4dd;
  --text:#111;
  --muted:#999;
  --faint:#ccc;
  --accent:#111;
  --green:#22c55e;
  --radius:14px;
  --font:'Geist',system-ui,sans-serif;
  --mono:'Geist Mono',monospace;
}

body{font-family:var(--font);background:var(--bg);min-height:100vh;color:var(--text)}

/* ── Header ── */
.header{text-align:center;padding:2.5rem 1rem 1.5rem}
.header h1{font-size:1.25rem;font-weight:500;letter-spacing:-0.01em;color:var(--text)}
.header p{font-size:0.7rem;color:var(--muted);margin-top:4px;letter-spacing:0.04em}

/* ── Stats ── */
.stats-bar{display:flex;justify-content:center;margin:0 auto 1.5rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--surface);max-width:360px}
.stat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--mono);font-size:1.1rem;color:var(--text);line-height:1}
.stat-l{font-size:0.6rem;color:var(--faint);margin-top:3px;letter-spacing:0.06em;text-transform:uppercase}

/* ── Nav ── */
.nav{display:flex;justify-content:center;gap:6px;margin-bottom:1.5rem}
.nav-btn{padding:7px 20px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.7rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:var(--font);letter-spacing:0.04em}
.nav-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.nav-btn:hover:not(.active){border-color:#aaa;color:var(--text)}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:8px;padding:0 1.2rem 1rem;flex-wrap:wrap;max-width:1100px;margin:0 auto}
.searchbox{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:8px 16px;transition:border-color 0.15s;flex:1;max-width:340px}
.searchbox:focus-within{border-color:var(--text)}
.searchbox svg{flex-shrink:0;color:var(--faint)}
.searchbox input{border:none;background:transparent;font-size:0.75rem;color:var(--text);outline:none;width:100%;font-family:var(--font)}
.searchbox input::placeholder{color:var(--faint)}
.sort-wrap{display:flex;gap:5px}
.sort-btn{padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.65rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:var(--font);letter-spacing:0.04em;white-space:nowrap}
.sort-btn.on{background:var(--text);color:#fff;border-color:var(--text)}

/* ── Genre pills ── */
.genre-row{padding:0 1.2rem 1rem;max-width:1100px;margin:0 auto;display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.65rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.12s;font-family:var(--font);letter-spacing:0.04em}
.pill.on{background:var(--text);color:#fff;border-color:var(--text)}
.pill:hover:not(.on){border-color:#aaa;color:var(--text)}

/* ── Status ── */
.status-bar{text-align:center;padding:2px 0 10px;font-size:0.65rem;color:var(--faint);letter-spacing:0.04em}
.status-bar span{color:var(--muted)}

/* ── Grid — images only ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:0 1.2rem 2rem;max-width:1100px;margin:0 auto}

.card{border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:1;background:var(--border);transition:transform 0.18s,opacity 0.18s}
.card:hover{transform:scale(1.03);z-index:2}
.card.fade-in{animation:fadeIn 0.3s ease both}

.card img{width:100%;height:100%;object-fit:cover;display:block;border-radius:var(--radius)}
.card-fallback{width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px;border-radius:var(--radius)}
.fb-t{font-size:0.7rem;font-weight:500;color:#fff;text-align:center;line-height:1.2;word-break:break-word}
.fb-a{font-size:0.6rem;color:rgba(255,255,255,0.55);text-align:center}

.check-ring{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;transform:scale(0);transition:transform 0.2s cubic-bezier(.34,1.4,.64,1);z-index:3}
.card.saved .check-ring{transform:scale(1)}
.check-ring svg{width:9px;height:9px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── Panel overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:100;pointer-events:none;transition:background 0.25s}
.overlay.open{background:rgba(0,0,0,0.3);pointer-events:all}

.panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.panel.open{transform:translateY(0)}

.panel-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.panel-head{display:flex;gap:16px;padding:16px 20px 0;flex-shrink:0}
.panel-cover{width:90px;height:90px;border-radius:10px;object-fit:cover;background:var(--border);flex-shrink:0}
.panel-cover-fallback{width:90px;height:90px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;flex-direction:column;gap:3px;padding:8px}
.panel-meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px}
.panel-title{font-size:1rem;font-weight:600;letter-spacing:-0.02em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.panel-artist{font-size:0.8rem;color:var(--muted)}
.panel-date{font-size:0.65rem;color:var(--faint);font-family:var(--mono);margin-top:4px}

.panel-actions{display:flex;gap:8px;margin-top:10px;align-items:center}
.btn-save{padding:7px 16px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.7rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s;color:var(--text)}
.btn-save:hover{border-color:var(--text)}
.btn-save.saved-btn{background:var(--text);color:#fff;border-color:var(--text)}

.stars-panel{display:flex;gap:2px}
.sp{font-size:1.2rem;cursor:pointer;color:var(--border);transition:color 0.1s}
.sp.on{color:#facc15}
.sp:hover{color:#facc15}

.panel-body{overflow-y:auto;padding:16px 20px 2rem;flex:1;-webkit-overflow-scrolling:touch}
.panel-section{margin-bottom:18px}
.panel-section-label{font-size:0.6rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}

/* Tracklist */
.tracklist{display:flex;flex-direction:column;gap:1px}
.track{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bg)}
.track:last-child{border-bottom:none}
.track-n{font-family:var(--mono);font-size:0.65rem;color:var(--faint);width:18px;text-align:right;flex-shrink:0}
.track-title{font-size:0.78rem;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-dur{font-family:var(--mono);font-size:0.65rem;color:var(--faint);flex-shrink:0}
.tracks-loading{font-size:0.72rem;color:var(--faint);padding:8px 0;display:flex;align-items:center;gap:8px}
.dot-pulse{display:flex;gap:4px}
.dot-pulse span{width:5px;height:5px;border-radius:50%;background:var(--faint);animation:dotPulse 1.2s ease infinite}
.dot-pulse span:nth-child(2){animation-delay:0.2s}
.dot-pulse span:nth-child(3){animation-delay:0.4s}

/* Opinion */
.opinion-wrap{display:flex;flex-direction:column;gap:6px}
.opinion-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:0.78rem;font-family:var(--font);color:var(--text);background:var(--bg);resize:none;outline:none;transition:border-color 0.15s;min-height:80px;line-height:1.5}
.opinion-input:focus{border-color:var(--text)}
.opinion-input::placeholder{color:var(--faint)}
.opinion-save-btn{align-self:flex-end;padding:6px 16px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.7rem;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s;color:var(--text)}
.opinion-save-btn:hover{background:var(--text);color:#fff;border-color:var(--text)}
.opinion-save-btn.saved-flash{background:var(--green);color:#fff;border-color:var(--green)}

/* Shelf empty */
.shelf-empty{grid-column:1/-1;text-align:center;padding:4rem 1rem}
.shelf-empty p{font-size:0.72rem;color:var(--faint);margin-top:8px;letter-spacing:0.04em}

/* Load more / spinner */
.load-more{display:block;margin:0 auto 3rem;padding:10px 28px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:0.7rem;font-weight:500;color:var(--muted);cursor:pointer;font-family:var(--font);letter-spacing:0.04em;transition:all 0.15s}
.load-more:hover{border-color:var(--text);color:var(--text)}
.load-more:disabled{opacity:0.3;cursor:default}
.spinner{display:none;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;margin:2rem auto}
.spinner.on{display:block}
.api-note{text-align:center;font-size:0.6rem;color:var(--faint);padding-bottom:2rem;letter-spacing:0.04em}
.api-note a{color:var(--faint)}

@keyframes fadeIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotPulse{0%,80%,100%{opacity:0.2}40%{opacity:1}}

/* panel on desktop — side sheet */
@media(min-width:700px){
  .panel{left:auto;right:0;top:0;bottom:0;width:400px;border-radius:0;max-height:100vh;transform:translateX(100%)}
  .panel.open{transform:translateX(0)}
  .panel-drag{display:none}
}
</style>
</head>
<body>

<div class="header">
  <h1>my albums</h1>
  <p>personal music shelf · data from MusicBrainz</p>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">saved</div></div>
  <div class="stat"><div class="stat-n" id="s-rated">0</div><div class="stat-l">rated</div></div>
  <div class="stat"><div class="stat-n" id="s-avg">—</div><div class="stat-l">avg ★</div></div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchTab('browse',this)">Browse</button>
  <button class="nav-btn" onclick="switchTab('shelf',this)">My Shelf</button>
</div>

<div class="toolbar">
  <div class="searchbox">
    <svg width="13" height="13" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="q" placeholder="Search any album or artist…" oninput="onSearch()">
  </div>
  <div class="sort-wrap">
    <button class="sort-btn on" id="sort-popular" onclick="setSort('popular',this)">Popular</button>
    <button class="sort-btn" id="sort-newest" onclick="setSort('newest',this)">Newest</button>
    <button class="sort-btn" id="sort-oldest" onclick="setSort('oldest',this)">Oldest</button>
  </div>
</div>

<div class="genre-row" id="genre-row"></div>
<div class="status-bar" id="status-bar"></div>
<div class="grid" id="grid"></div>
<div class="spinner" id="spinner"></div>
<button class="load-more" id="load-more-btn" onclick="loadMore()" style="display:none">Load more</button>
<p class="api-note">Data from <a href="https://musicbrainz.org" target="_blank">MusicBrainz</a> · Art from Cover Art Archive</p>

<!-- ── Panel ── -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-drag"></div>

  <div class="panel-head">
    <img id="p-img" class="panel-cover" src="" alt="" onerror="this.style.display='none';document.getElementById('p-img-fallback').style.display='flex'">
    <div id="p-img-fallback" class="panel-cover-fallback" style="display:none"></div>
    <div class="panel-meta">
      <div class="panel-title" id="p-title">—</div>
      <div class="panel-artist" id="p-artist">—</div>
      <div class="panel-date" id="p-date"></div>
      <div class="panel-actions">
        <button class="btn-save" id="p-save-btn" onclick="panelToggle()">+ Save</button>
        <div class="stars-panel" id="p-stars"></div>
      </div>
    </div>
  </div>

  <div class="panel-body">
    <!-- Opinion section — always visible -->
    <div class="panel-section" id="p-opinion-wrap">
      <div class="panel-section-label">My opinion</div>
      <div class="opinion-wrap">
        <textarea class="opinion-input" id="p-opinion" placeholder="What do you think of this album…" rows="3" oninput="opinionChanged()"></textarea>
        <button class="opinion-save-btn" id="p-opinion-btn" onclick="saveOpinion()">Save note</button>
      </div>
    </div>

    <!-- Tracklist -->
    <div class="panel-section">
      <div class="panel-section-label">Tracklist</div>
      <div class="tracklist" id="p-tracks">
        <div class="tracks-loading"><div class="dot-pulse"><span></span><span></span><span></span></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const GENRES=['all','rock','pop','hip hop','jazz','electronic','r&b','soul','metal','folk','classical','country','reggae','punk','indie'];
const COLORS=['#2b2d42','#6b1a1a','#1d4ed8','#1a5c1a','#b91c1c','#92610a','#1e40af','#5b21b6','#065f46','#be185d','#155e75','#7c2d12','#0f172a','#4a1d96','#3b0764','#166534','#854d0e','#1c1917','#0ea5e9','#7f1d1d'];
const SEED_ARTISTS=['radiohead','beatles','kendrick lamar','frank ocean','beyonce','pink floyd','nirvana','michael jackson','taylor swift','kanye west','amy winehouse','miles davis','fleetwood mac','the weeknd','bob dylan','daft punk','prince','stevie wonder','madonna','david bowie','lcd soundsystem','arcade fire','tame impala','nas','jay-z','billie eilish','adele','drake','rihanna','eminem','sade','portishead','bjork','fiona apple','phoebe bridgers','lorde','haim','angel olsen'];

let shelf={}, activeTab='browse', currentSort='popular', activeGenre='all';
let browseOffset=0, browseTotal=0, loading=false, searchTimeout=null;
let panelAlbum=null; // {id, title, artist, year}
const PAGE=24;

function loadShelf(){try{const s=localStorage.getItem('mab_shelf5');if(s)shelf=JSON.parse(s);}catch(e){}}
function saveShelf(){try{localStorage.setItem('mab_shelf5',JSON.stringify(shelf));}catch(e){}}

function albumColor(id){let h=0;for(let i=0;i<id.length;i++){h=((h<<5)-h)+id.charCodeAt(i);h|=0;}return COLORS[Math.abs(h)%COLORS.length];}
function coverUrl(mbid){return `https://coverartarchive.org/release/${mbid}/front-250`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function msToTime(ms){if(!ms)return'';const s=Math.round(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

// ── Panel ──────────────────────────────────────────────────────────────────
function openPanel(album){
  panelAlbum=album;
  const {id,title,artist,year}=album;
  const color=albumColor(id);

  // Cover
  const img=document.getElementById('p-img');
  const fb=document.getElementById('p-img-fallback');
  img.style.display='block'; fb.style.display='none';
  img.src=coverUrl(id);
  fb.style.background=color;
  fb.innerHTML=`<div class="fb-t" style="color:#fff">${esc(title)}</div><div class="fb-a" style="color:rgba(255,255,255,0.5)">${esc(artist)}</div>`;

  document.getElementById('p-title').textContent=title;
  document.getElementById('p-artist').textContent=artist;
  document.getElementById('p-date').textContent=year||'';
  updateSaveBtn(id);
  renderPanelStars(id);

  // Opinion
  const op=shelf[id]?.opinion||'';
  document.getElementById('p-opinion').value=op;
  document.getElementById('p-opinion-btn').classList.remove('saved-flash');

  // Tracklist
  document.getElementById('p-tracks').innerHTML='<div class="tracks-loading"><div class="dot-pulse"><span></span><span></span><span></span></div></div>';
  fetchTracks(id);

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.body.style.overflow='';
  panelAlbum=null;
}

async function fetchTracks(id){
  try{
    const r=await fetch(`https://musicbrainz.org/ws/2/release/${id}?inc=recordings&fmt=json`,{headers:{'User-Agent':'MyAlbumsShelf/3.0 ( music-shelf-app )'}});
    if(!r.ok) throw new Error('');
    const data=await r.json();

    // Date
    const date=data.date||data['release-events']?.[0]?.date||'';
    document.getElementById('p-date').textContent=date||'';

    const media=data.media||[];
    const tracks=[];
    media.forEach(m=>{
      const discN=media.length>1?m.position:null;
      (m.tracks||[]).forEach(t=>{
        tracks.push({n:t.position,title:t.title,len:t.length,disc:discN});
      });
    });

    if(!tracks.length){
      document.getElementById('p-tracks').innerHTML='<div style="font-size:0.72rem;color:var(--faint);padding:8px 0">No tracklist available</div>';
      return;
    }

    let html='';
    let lastDisc=null;
    tracks.forEach(t=>{
      if(t.disc&&t.disc!==lastDisc){
        html+=`<div style="font-size:0.6rem;color:var(--faint);text-transform:uppercase;letter-spacing:0.08em;padding:8px 0 4px">Disc ${t.disc}</div>`;
        lastDisc=t.disc;
      }
      html+=`<div class="track"><span class="track-n">${t.n}</span><span class="track-title">${esc(t.title)}</span><span class="track-dur">${msToTime(t.len)}</span></div>`;
    });

    document.getElementById('p-tracks').innerHTML=html;
  }catch(e){
    document.getElementById('p-tracks').innerHTML='<div style="font-size:0.72rem;color:var(--faint);padding:8px 0">Could not load tracklist</div>';
  }
}

function updateSaveBtn(id){
  const btn=document.getElementById('p-save-btn');
  if(shelf[id]){btn.textContent='✓ Saved';btn.classList.add('saved-btn');}
  else{btn.textContent='+ Save';btn.classList.remove('saved-btn');}
}

function renderPanelStars(id){
  const rating=shelf[id]?.rating||0;
  document.getElementById('p-stars').innerHTML=[1,2,3,4,5].map(i=>
    `<span class="sp${i<=rating?' on':''}" onclick="setPanelRating(${i})">${i<=rating?'★':'☆'}</span>`
  ).join('');
}

function setPanelRating(v){
  if(!panelAlbum) return;
  const id=panelAlbum.id;
  if(!shelf[id]) shelf[id]={addedAt:Date.now(),title:panelAlbum.title,artist:panelAlbum.artist,year:panelAlbum.year};
  shelf[id].rating=v;
  saveShelf(); updateStats(); renderPanelStars(id);
  // Update grid card checkmark
  updateCardSaved(id,true);
  updateSaveBtn(id);
}

function panelToggle(){
  if(!panelAlbum) return;
  const {id,title,artist,year}=panelAlbum;
  if(shelf[id]){
    delete shelf[id];
    updateCardSaved(id,false);
  } else {
    shelf[id]={rating:0,addedAt:Date.now(),title,artist,year};
    updateCardSaved(id,true);
  }
  saveShelf(); updateStats(); updateSaveBtn(id); renderPanelStars(id);
  if(activeTab==='shelf') renderShelf();
}

function opinionChanged(){
  document.getElementById('p-opinion-btn').classList.remove('saved-flash');
}

function saveOpinion(){
  if(!panelAlbum) return;
  const id=panelAlbum.id;
  const text=document.getElementById('p-opinion').value.trim();
  if(!shelf[id]) shelf[id]={rating:0,addedAt:Date.now(),title:panelAlbum.title,artist:panelAlbum.artist,year:panelAlbum.year};
  shelf[id].opinion=text;
  saveShelf();
  const btn=document.getElementById('p-opinion-btn');
  btn.classList.add('saved-flash');
  btn.textContent='Saved ✓';
  setTimeout(()=>{btn.textContent='Save note';},1500);
}

function updateCardSaved(id,isSaved){
  const card=document.getElementById('card-'+id);
  if(!card) return;
  card.classList.toggle('saved',isSaved);
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats(){
  const ids=Object.keys(shelf);
  const rated=ids.filter(id=>shelf[id]?.rating>0);
  const avg=rated.length?(rated.reduce((s,id)=>s+(shelf[id].rating||0),0)/rated.length).toFixed(1):'—';
  document.getElementById('s-total').textContent=ids.length;
  document.getElementById('s-rated').textContent=rated.length;
  document.getElementById('s-avg').textContent=avg;
}

// ── Card HTML (image only) ─────────────────────────────────────────────────
function cardHtml(r, delay=0){
  const id=r.id;
  const title=r.title||'Unknown';
  const artist=r['artist-credit']?.[0]?.artist?.name||r['artist-credit']?.[0]?.name||'Unknown';
  const year=(r.date||r['first-release-date']||'').slice(0,4);
  const saved=!!shelf[id];
  const color=albumColor(id);
  const album={id,title,artist,year};
  const albumJson=JSON.stringify(album).replace(/'/g,'\\u0027').replace(/"/g,'&quot;');

  return `<div class="card fade-in${saved?' saved':''}" id="card-${id}" style="animation-delay:${delay}ms" onclick="openPanel(${albumJson})">
    <img src="${coverUrl(id)}" alt="${esc(title)}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="card-fallback" style="background:${color}">
      <div class="fb-t">${esc(title)}</div>
      <div class="fb-a">${esc(artist)}</div>
    </div>
    <div class="check-ring"><svg viewBox="0 0 13 10"><polyline points="1.5,5 5,8.5 11.5,1.5"/></svg></div>
  </div>`;
}

// ── Shelf tab ─────────────────────────────────────────────────────────────
function renderShelf(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const grid=document.getElementById('grid');
  document.getElementById('load-more-btn').style.display='none';
  document.getElementById('spinner').classList.remove('on');

  const ids=Object.keys(shelf);
  if(!ids.length){
    grid.innerHTML='<div class="shelf-empty"><p>Tap any album to save it here</p></div>';
    document.getElementById('status-bar').innerHTML='';
    return;
  }

  const saved=ids.map(id=>({id,...shelf[id]}))
    .filter(a=>!q||(a.title||'').toLowerCase().includes(q)||(a.artist||'').toLowerCase().includes(q))
    .sort((a,b)=>b.addedAt-a.addedAt);

  grid.innerHTML=saved.map((a,i)=>{
    const color=albumColor(a.id);
    const title=a.title||'Unknown', artist=a.artist||'Unknown', year=a.year||'';
    const album={id:a.id,title,artist,year};
    const albumJson=JSON.stringify(album).replace(/'/g,'\\u0027').replace(/"/g,'&quot;');
    return `<div class="card fade-in saved" id="card-${a.id}" style="animation-delay:${i*25}ms" onclick="openPanel(${albumJson})">
      <img src="${coverUrl(a.id)}" alt="${esc(title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-fallback" style="background:${color}"><div class="fb-t">${esc(title)}</div><div class="fb-a">${esc(artist)}</div></div>
      <div class="check-ring"><svg viewBox="0 0 13 10"><polyline points="1.5,5 5,8.5 11.5,1.5"/></svg></div>
    </div>`;
  }).join('');

  document.getElementById('status-bar').innerHTML=`<span>${saved.length}</span> album${saved.length!==1?'s':''} saved`;
}

// ── MusicBrainz API ────────────────────────────────────────────────────────
async function mbFetch(query,offset){
  const params=new URLSearchParams({query,limit:PAGE,offset,fmt:'json'});
  const r=await fetch(`https://musicbrainz.org/ws/2/release/?${params}`,{headers:{'User-Agent':'MyAlbumsShelf/3.0 ( music-shelf-app )'}});
  if(!r.ok) throw new Error('API error '+r.status);
  return r.json();
}

function buildQuery(q,genre,sort){
  let parts=[];
  if(q.trim()){
    parts.push(`(release:"${q}" OR artist:"${q}")`);
  } else {
    if(sort==='popular'){
      const seed=SEED_ARTISTS[Math.floor((browseOffset/PAGE))%SEED_ARTISTS.length];
      parts.push(`artist:"${seed}"`);
    } else {
      parts.push('status:Official');
    }
  }
  if(genre!=='all') parts.push(`tag:"${genre}"`);
  parts.push('primarytype:Album');
  parts.push('status:Official');
  return parts.join(' AND ');
}

async function fetchBrowse(reset=false){
  if(loading) return;
  loading=true;
  if(reset){browseOffset=0;browseTotal=0;}
  const q=document.getElementById('q').value;
  const grid=document.getElementById('grid');
  const spinner=document.getElementById('spinner');
  const btn=document.getElementById('load-more-btn');
  if(reset) grid.innerHTML='';
  spinner.classList.add('on');
  btn.style.display='none';
  try{
    const query=buildQuery(q,activeGenre,currentSort);
    const data=await mbFetch(query,browseOffset);
    const releases=(data.releases||[]).filter(r=>r.id&&r.title);
    browseTotal=data.count||0;
    browseOffset+=releases.length;
    if(!releases.length&&reset){
      grid.innerHTML='<div class="shelf-empty"><p>No results — try a different search</p></div>';
      document.getElementById('status-bar').innerHTML='';
    } else {
      grid.insertAdjacentHTML('beforeend',releases.map((r,i)=>cardHtml(r,i*30)).join(''));
      const showing=grid.querySelectorAll('.card').length;
      document.getElementById('status-bar').innerHTML=browseTotal?`<span>${showing.toLocaleString()}</span> of <span>${browseTotal.toLocaleString()}+</span> albums`:'';
    }
    btn.style.display=q.trim()?browseOffset<browseTotal?'block':'none':'block';
  }catch(e){
    grid.insertAdjacentHTML('beforeend','<div style="grid-column:1/-1;text-align:center;color:var(--faint);padding:2rem;font-size:0.7rem">Could not reach MusicBrainz — check your connection.</div>');
    btn.style.display='none';
  }
  spinner.classList.remove('on');
  loading=false;
}

function loadMore(){fetchBrowse(false);}

// ── Controls ───────────────────────────────────────────────────────────────
function setSort(s,el){
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(activeTab==='browse') fetchBrowse(true);
}

function setGenre(g){
  activeGenre=g;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.dataset.genre===g));
  if(activeTab==='browse') fetchBrowse(true);
}

function onSearch(){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{
    if(activeTab==='browse') fetchBrowse(true);
    else renderShelf();
  },400);
}

function switchTab(t,el){
  activeTab=t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(t==='browse') fetchBrowse(true);
  else renderShelf();
}

// Keyboard close
document.addEventListener('keydown',e=>{if(e.key==='Escape') closePanel();});

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('genre-row').innerHTML=GENRES.map(g=>
  `<button class="pill${g==='all'?' on':''}" data-genre="${g}" onclick="setGenre('${g}')">${g==='all'?'All':g.charAt(0).toUpperCase()+g.slice(1)}</button>`
).join('');

loadShelf(); updateStats(); fetchBrowse(true);
</script>
